<!doctype html>
<meta charset="utf-8">
<style>html,body{margin:0;padding:0;background:#0c1016;overflow:hidden}</style>
<canvas id="c" width="1080" height="1920"></canvas>
<script>
// Beat 10: the actual pipeline command typed with a blinking cursor, then a
// play button blooms. One script, one command, one cut.
const cv=document.getElementById('c'), x=cv.getContext('2d');
const BG='#0c1016', TEXT='#e8e6df', DIM='#7d8590', ACC='#ffb454';
const ease=t=>t<=0?0:t>=1?1:t*t*(3-2*t);
let D={command:'node pipeline.mjs --script input/script.md'};
window.setData=d=>{D=Object.assign(D,d);};

window.renderFrame=(f,total)=>{
  x.fillStyle=BG; x.fillRect(0,0,1080,1920);
  const t=f/(total-1);
  const cmd='$ '+D.command;
  x.font='500 30px "SF Mono", Menlo, monospace';
  const chars=Math.floor(ease(Math.min(1,t/0.42))*cmd.length);
  const shown=cmd.slice(0,chars);
  const tx=90, ty=880;
  x.fillStyle=TEXT; x.fillText(shown, tx, ty);
  // block cursor blinks on a 15-frame cadence until the bloom starts
  if(t<0.55 && Math.floor(f/15)%2===0){ x.fillStyle=ACC; x.fillRect(tx+8+x.measureText(shown).width, ty-24, 16, 30); }

  // play button bloom
  const bT=ease(Math.max(0,(t-0.55)/0.3));
  if(bT>0){
    const r=120*bT, cx=540, cy=1120;
    x.globalAlpha=bT;
    // soft ring
    x.strokeStyle=ACC; x.lineWidth=6; x.globalAlpha=bT*0.35;
    x.beginPath(); x.arc(cx,cy,r+26+14*(1-bT),0,7); x.stroke();
    x.globalAlpha=bT;
    x.fillStyle=ACC; x.beginPath(); x.arc(cx,cy,r,0,7); x.fill();
    x.fillStyle='#0c1016';
    x.beginPath(); x.moveTo(cx-r*0.32,cy-r*0.42); x.lineTo(cx+r*0.52,cy); x.lineTo(cx-r*0.32,cy+r*0.42); x.closePath(); x.fill();
    x.globalAlpha=1;
  }
  // wordmark
  const wT=ease(Math.max(0,(t-0.72)/0.2));
  if(wT>0){
    x.globalAlpha=wT; x.textAlign='center';
    x.fillStyle=TEXT; x.font='700 44px "SF Mono", Menlo, monospace';
    x.fillText('picture-lock', 540, 1400);
    x.fillStyle=DIM; x.font='500 28px "SF Mono", Menlo, monospace';
    x.fillText('one script · one command · one cut', 540, 1460);
    x.textAlign='left'; x.globalAlpha=1;
  }
};
</script>
